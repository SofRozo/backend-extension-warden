# ═══════════════════════════════════════════════════════════════════════════════
# Development overlay — exposes Postgres and Redis ports to the host so the
# worker can be run natively (e.g. with ts-node / npm run start:dev).
#
# Usage:
#   docker-compose -f docker-compose.yml -f docker-compose.dev.yml up -d postgres redis api
#
# Then run the worker locally:
#   npm run start:dev (in a separate terminal)
#
# WARNING: do NOT use this file in production.
# ═══════════════════════════════════════════════════════════════════════════════

services:
  postgres:
    ports:
      - "5432:5432"

  redis:
    ports:
      - "6379:6379"
